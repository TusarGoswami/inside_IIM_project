<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="roughen">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" result="noise" seed="7"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6"/>
    </filter>
  </defs>

  <!-- outer stamped ring -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="#8B2E2E" stroke-width="5" filter="url(#roughen)"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="#8B2E2E" stroke-width="2.5" filter="url(#roughen)"/>

  <!-- top curved text -->
  <path id="topArc" d="M 32 100 A 68 68 0 0 1 168 100" fill="none"/>
  <text font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="13" font-weight="700" letter-spacing="3" fill="#8B2E2E" filter="url(#roughen)">
    <textPath href="#topArc" startOffset="8%">INVESTMENT COMMITTEE</textPath>
  </text>

  <!-- bottom curved text -->
  <path id="bottomArc" d="M 168 100 A 68 68 0 0 1 32 100" fill="none"/>
  <text font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="13" font-weight="700" letter-spacing="4" fill="#8B2E2E" filter="url(#roughen)">
    <textPath href="#bottomArc" startOffset="14%">THE DEAL DESK</textPath>
  </text>

  <!-- center monogram -->
  <text x="100" y="118" text-anchor="middle" font-family="'Lora', Georgia, serif" font-weight="700" font-size="58" fill="#8B2E2E" filter="url(#roughen)">DD</text>

  <!-- small divider stars -->
  <text x="60" y="106" text-anchor="middle" font-size="14" fill="#8B2E2E" filter="url(#roughen)">★</text>
  <text x="140" y="106" text-anchor="middle" font-size="14" fill="#8B2E2E" filter="url(#roughen)">★</text>
</svg>
